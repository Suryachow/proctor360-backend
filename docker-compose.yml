services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./api
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - ai-engine
    ports:
      - "8000:8000"

  ai-engine:
    build:
      context: ./ai-engine
    env_file:
      - .env
    ports:
      - "8100:8100"



  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.1
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandproxy-addr 0.0.0.0:8082
      - --advertise-pandproxy-addr localhost:8082
    ports:
      - "19092:19092"
      - "8082:8082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - api

volumes:
  postgres_data:
  redpanda_data:
  n8n_data:
